services:
  postgres:
    image: postgres:16-alpine
    container_name: meru-tour-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: meru
      POSTGRES_PASSWORD: meru_secret
      POSTGRES_DB: meru_tour
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
